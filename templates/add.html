<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление студента</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white text-center">
                        <h4 class="mb-0">Регистрация нового студента</h4>
                    </div>
                    <div class="card-body">
                        <form action="/add" method="POST" enctype="multipart/form-data">

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">ФИО (на русском) *</label>
                                    <input type="text" class="form-control" name="full_name_ru" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">ФИО (на китайском)</label>
                                    <input type="text" class="form-control" name="full_name_zh">
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Номер паспорта *</label>
                                    <input type="text" class="form-control" name="passport" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Выбранная программа *</label>
                                    <select class="form-select" name="program" required>
                                        <option value="Бакалавриат">Бакалавриат</option>
                                        <option value="Магистратура">Магистратура</option>
                                        <option value="Языковые курсы">Языковые курсы</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Адрес проживания</label>
                                <textarea class="form-control" name="address" rows="2"></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Скан паспорта (PDF/JPG)</label>
                                <input class="form-control" type="file" name="document" accept=".pdf, .jpg, .jpeg, .png">
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/" class="btn btn-outline-secondary">Назад</a>
                                <button type="submit" class="btn btn-success">Сохранить</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
